defaults:
  - default
  - override callbacks: generation
  - _self_

# Generation is pinned to a single device today, even though
# ``_sort_per_trajectory_by_dataset_row_index`` is robust to arrival-order reshuffling.
# Under DDP, Lightning's ``Trainer.predict`` returns per-rank-local predictions (it does not
# auto-gather across ranks), and user code after the predict call runs on every rank — so
# removing this pin without also adding (a) an explicit cross-rank gather + (b) rank-0-only
# file writes would have each rank fail the ``_sort_per_trajectory_by_dataset_row_index``
# set-completeness check (each rank sees only its slice) and race to write the same parquet
# paths. Proper DDP-parallel generation needs a ``BasePredictionWriter`` (or equivalent
# gather-then-rank-zero-write wiring); tracked as a follow-up.
devices: 1

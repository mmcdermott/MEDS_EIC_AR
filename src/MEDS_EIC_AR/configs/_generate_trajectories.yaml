defaults:
  - datamodule: generate_trajectories
  - trainer: default
  - inference: default
  - _self_

model_initialization_dir: ???
_generation_context_size: ${resolve_generation_context_size:${seq_lens}}
output_dir: ???

seed: null

pretrained_model_config: ${load_yaml_file:${model_initialization_dir}/config.yaml}
ckpt_path: ${model_initialization_dir}/best_model.ckpt

do_overwrite: False

seq_lens:
  max_generated_trajectory_len: null
  frac_seq_len_as_context: 0.25
  generation_context_size: null
  pretrained_max_seq_len: ${pretrained_model_config.max_seq_len}

# Rolling (sliding-window) generation controls. When `max_new_tokens` is null, generation stays on the legacy
# single-chunk path: at most `pretrained_max_seq_len - input_len` new tokens are emitted per sample. Setting
# `max_new_tokens` to an integer switches on the rolling loop, which slides the context window and keeps
# generating until either every sample has emitted `TIMELINE//END` or the total new-token budget is reached.
# `rolling_context_size` is the per-chunk prompt size fed to the model; null defaults to
# `pretrained_max_seq_len - 1` so that, once the sliding window is full, every chunk emits exactly one
# new token per call (the minimum guaranteed progress). Earlier chunks — before the window saturates —
# can emit more than one token per call because the prompt is still shorter than `pretrained_max_seq_len`.
rolling_generation:
  max_new_tokens: null
  rolling_context_size: null

log_dir: ${output_dir}/.logs

hydra:
  run:
    dir: "${log_dir}"
